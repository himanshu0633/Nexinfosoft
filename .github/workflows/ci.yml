name: Nexinfosoft CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    name: Build & Verify Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Root (Frontend) Dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci || npm install

      - name: Install Backend Dependencies
        run: |
          echo "Installing backend dependencies..."
          cd backend
          npm ci || npm install

      - name: Compile and Build Frontend
        run: |
          echo "Building frontend project using Vite..."
          npm run build

      - name: Lint Verification (If configured)
        run: |
          echo "Running syntax & linting checks..."
          npm run lint
